services:

  proxy:
    build:
      context: ${EXAMPLE_DIR}
      dockerfile: images/reverse-proxy/Dockerfile
    depends_on:
      kbn-ror:
        condition: service_healthy
      kbn-ror-2:
        condition: service_healthy
    networks:
      - ror-network
    ports:
      - "8082:80"
      - "8443:443"
    environment:
      REWRITE_BASE_PATH_BY_KIBANA: ${REWRITE_BASE_PATH_BY_KIBANA:-true}
    entrypoint: ["sh", "/usr/local/bin/reverse-proxy-entrypoint.sh"]

  keycloak:
    profiles: ["ENT"]
    image: quay.io/keycloak/keycloak:20.0.5
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ${EXAMPLE_DIR}/keycloak/ror-realm.json:/opt/keycloak/data/import/ror-realm.json:ro
    command: ["start-dev", "--import-realm", "--hostname=kc.localhost", "--http-enabled=true", "--http-port=8080"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fksS --connect-timeout 3 --max-time 5 --retry 5 --retry-connrefused http://127.0.0.1:8080/realms/ror/.well-known/openid-configuration >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s
    networks:
      ror-network:
        aliases:
          - kc.localhost
